apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wcag.fullname" . }}-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "wcag.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64 encoded development placeholders
  POSTGRES_PASSWORD: {{ "admin123" | b64enc | quote }}
  POSTGRES_USER: {{ "admin" | b64enc | quote }}
  AWS_ACCESS_KEY_ID: {{ "test" | b64enc | quote }}
  AWS_SECRET_ACCESS_KEY: {{ "test" | b64enc | quote }}
  OPENAI_API_KEY: {{ "sk-dummy-key" | b64enc | quote }}
  LLM_API_KEY: {{ "sk-dummy-key" | b64enc | quote }}
