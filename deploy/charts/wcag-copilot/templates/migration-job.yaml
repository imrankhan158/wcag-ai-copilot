apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "wcag.fullname" . }}-migration-job
  namespace: {{ .Values.global.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      containers:
        - name: migration-runner
          image: "{{ .Values.services.audit-service.image }}:{{ .Values.services.audit-service.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy | quote }}
          command: ["uv", "run", "alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: {{ include "wcag.fullname" . }}-config
            - secretRef:
                name: {{ include "wcag.fullname" . }}-secrets
      restartPolicy: OnFailure
