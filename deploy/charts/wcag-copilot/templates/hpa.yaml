{{- range $serviceName, $service := .Values.services }}
{{- if and $service.minReplicas $service.maxReplicas }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "wcag.fullname" $ }}-{{ $serviceName }}-hpa
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "wcag.labels" $ | nindent 4 }}
    service: {{ $serviceName }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "wcag.fullname" $ }}-{{ $serviceName }}
  minReplicas: {{ $service.minReplicas }}
  maxReplicas: {{ $service.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $service.targetCPU }}
---
{{- end }}
{{- end }}
