apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wcag.fullname" . }}-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "wcag.labels" . | nindent 4 }}
data:
  POSTGRES_HOST: {{ .Values.config.postgresHost | quote }}
  POSTGRES_PORT: {{ .Values.config.postgresPort | quote }}
  REDIS_URL: {{ .Values.config.redisUrl | quote }}
  QDRANT_URL: {{ .Values.config.qdrantUrl | quote }}
  AWS_ENDPOINT_URL: {{ .Values.config.awsEndpointUrl | quote }}
  AWS_DEFAULT_REGION: {{ .Values.config.awsDefaultRegion | quote }}
  OPENAI_BASE_URL: {{ .Values.config.openaiBaseUrl | quote }}
  LLM_MODEL: {{ .Values.config.llmModel | quote }}
  DENSE_EMBEDDING_MODEL: {{ .Values.config.embeddingModel | quote }}
  DENSE_EMBEDDING_DIM: {{ .Values.config.embeddingDim | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otelCollectorEndpoint | quote }}
  SECRETS_PROVIDER: {{ .Values.config.secretsProvider | quote }}
  SECRETS_NAME: {{ .Values.config.secretsName | quote }}
